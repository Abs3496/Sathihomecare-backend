spring.application.name=sathi-backend
server.port=${PORT:${SERVER_PORT:8080}}

# Default application database: H2 in-memory for local development.
# Override with DB_URL, DB_USERNAME, DB_PASSWORD, and DB_DRIVER for MySQL or production databases.
spring.datasource.url=${DB_URL:jdbc:h2:mem:sathi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-to-a-long-256-bit-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:rzp_test_your_key_secret}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.bootstrap.admin1.name=${ADMIN1_NAME:Admin User}
app.bootstrap.admin1.email=${ADMIN1_EMAIL:admin@sathihomecare.in}
app.bootstrap.admin1.phone=${ADMIN1_PHONE:9000000001}
app.bootstrap.admin1.password=${ADMIN1_PASSWORD:admin@123}
app.bootstrap.admin2.name=${ADMIN2_NAME:}
app.bootstrap.admin2.email=${ADMIN2_EMAIL:}
app.bootstrap.admin2.phone=${ADMIN2_PHONE:}
app.bootstrap.admin2.password=${ADMIN2_PASSWORD:}

springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html
