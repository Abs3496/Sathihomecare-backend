# ===============================
# DEFAULT LOCAL DEVELOPMENT CONFIG
# ===============================
# Local H2 is used if DB_URL is not provided.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Leave driver autodetection to Spring Boot so both H2 and MySQL work.

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT + PAYMENT CONFIG
# ===============================
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-256-bit-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:rzp_test_your_key_secret}

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
