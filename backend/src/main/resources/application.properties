# ===============================
# DEFAULT LOCAL DEVELOPMENT CONFIG
# ===============================
# Local H2 is used if DB_URL is not provided.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# JWT + PAYMENT CONFIG
# ===============================
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-256-bit-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:rzp_test_your_key_secret}

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
