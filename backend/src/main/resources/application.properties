# ===============================
# DEFAULT LOCAL DEVELOPMENT CONFIG
# ===============================
# Local H2 is used if DB_URL is not provided.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.hibernate.use-new-id-generator-mappings=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT + PAYMENT CONFIG
# ===============================
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-256-bit-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:rzp_test_your_key_secret}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.bootstrap.admin1.name=${APP_BOOTSTRAP_ADMIN1_NAME:${ADMIN1_NAME:}}
app.bootstrap.admin1.email=${APP_BOOTSTRAP_ADMIN1_EMAIL:${ADMIN1_EMAIL:}}
app.bootstrap.admin1.phone=${APP_BOOTSTRAP_ADMIN1_PHONE:${ADMIN1_PHONE:}}
app.bootstrap.admin1.password=${APP_BOOTSTRAP_ADMIN1_PASSWORD:${ADMIN1_PASSWORD:}}
app.bootstrap.admin2.name=${APP_BOOTSTRAP_ADMIN2_NAME:${ADMIN2_NAME:}}
app.bootstrap.admin2.email=${APP_BOOTSTRAP_ADMIN2_EMAIL:${ADMIN2_EMAIL:}}
app.bootstrap.admin2.phone=${APP_BOOTSTRAP_ADMIN2_PHONE:${ADMIN2_PHONE:}}
app.bootstrap.admin2.password=${APP_BOOTSTRAP_ADMIN2_PASSWORD:${ADMIN2_PASSWORD:}}

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
