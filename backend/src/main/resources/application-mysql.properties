spring.application.name=sathi-backend
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sathi_homecare}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-to-a-long-256-bit-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:rzp_test_your_key_secret}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://sathihomecare.in}
app.bootstrap.admin1.name=${APP_BOOTSTRAP_ADMIN1_NAME:${ADMIN1_NAME:}}
app.bootstrap.admin1.email=${APP_BOOTSTRAP_ADMIN1_EMAIL:${ADMIN1_EMAIL:}}
app.bootstrap.admin1.phone=${APP_BOOTSTRAP_ADMIN1_PHONE:${ADMIN1_PHONE:}}
app.bootstrap.admin1.password=${APP_BOOTSTRAP_ADMIN1_PASSWORD:${ADMIN1_PASSWORD:}}
app.bootstrap.admin2.name=${APP_BOOTSTRAP_ADMIN2_NAME:${ADMIN2_NAME:}}
app.bootstrap.admin2.email=${APP_BOOTSTRAP_ADMIN2_EMAIL:${ADMIN2_EMAIL:}}
app.bootstrap.admin2.phone=${APP_BOOTSTRAP_ADMIN2_PHONE:${ADMIN2_PHONE:}}
app.bootstrap.admin2.password=${APP_BOOTSTRAP_ADMIN2_PASSWORD:${ADMIN2_PASSWORD:}}

springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html
